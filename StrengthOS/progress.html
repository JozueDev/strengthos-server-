<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Mi Progreso | StrengthOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=06009">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="/images/logo.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
    </style>
</head>

<body style="padding-top: 90px;">
    <div class="particles-container" id="particles"></div>

    <nav class="navbar scrolled" id="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="logo-container">
                <img src="images/logo.png" alt="StrengthOS Logo" class="logo-img">
                <span class="logo-text">StrengthOS</span>
            </a>
        </div>
    </nav>

    <div class="container section-padding" style="max-width: 800px;">
        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 32px;">
            <a href="dashboard.html" class="back-btn">← Menú</a>
            <h1 style="font-size: 1.6rem; color: var(--text-primary);">📈 Mi Progreso</h1>
        </div>

        <div class="glass-card">
            <p style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 20px;">
                Selecciona un mes para ver tus gráficas de evolución en repeticiones totales y cargas máximas.
            </p>

            <select id="monthly-stats-select"
                style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; margin-bottom: 30px;">
                <option value="">Selecciona un mes...</option>
            </select>

            <div id="monthly-stats-container" style="display: flex; flex-direction: column; gap: 30px;">
                <!-- JS inyecta gráficas -->
            </div>
        </div>
    </div>

    <script src="script.js?v=06009"></script>
    <script src="progress.js?v=06009"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW failed:', e));
            });
        }
    </script>
</body>

</html>
