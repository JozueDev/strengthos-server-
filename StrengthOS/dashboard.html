<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel | StrengthOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=06009">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="/images/logo.png">
    <style>
        .menu-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
        }

        .menu-greeting {
            text-align: center;
            margin-bottom: 48px;
        }

        .menu-greeting h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            background: linear-gradient(135deg, #fff 0%, var(--primary-200) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .menu-greeting p {
            color: var(--text-tertiary);
            font-size: 1rem;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 860px;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 32px 28px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .menu-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.08) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .menu-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(var(--primary-rgb), 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(var(--primary-rgb), 0.2);
        }

        .menu-card:hover::before {
            opacity: 1;
        }

        .menu-card-icon {
            font-size: 2.5rem;
            line-height: 1;
        }

        .menu-card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .menu-card-desc {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            line-height: 1.5;
        }

        .logout-link {
            margin-top: 40px;
            color: var(--text-tertiary);
            font-size: 0.9rem;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            transition: color 0.2s;
        }

        .logout-link:hover {
            color: #ef4444;
        }
    </style>
</head>

<body>
    <div class="particles-container" id="particles"></div>

    <nav class="navbar scrolled" id="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="logo-container">
                <img src="images/logo.png" alt="StrengthOS Logo" class="logo-img">
                <span class="logo-text">StrengthOS</span>
            </a>
        </div>
    </nav>

    <div class="menu-page">
        <div class="menu-greeting">
            <h1>¡Bienvenido, <span id="user-name">Atleta</span>!</h1>
            <p>¿Qué quieres hacer hoy?</p>
        </div>

        <div class="menu-grid">
            <a href="calendar.html" class="menu-card">
                <div class="menu-card-icon">📅</div>
                <div class="menu-card-title">Mis Entrenos</div>
                <div class="menu-card-desc">Consulta tu calendario de entrenamiento y registra tu progreso diario.</div>
            </a>

            <a href="progress.html" class="menu-card">
                <div class="menu-card-icon">📈</div>
                <div class="menu-card-title">Mi Progreso</div>
                <div class="menu-card-desc">Visualiza gráficas de evolución de repeticiones y cargas por mes.</div>
            </a>

            <a href="security.html" class="menu-card">
                <div class="menu-card-icon">🔒</div>
                <div class="menu-card-title">Seguridad</div>
                <div class="menu-card-desc">Actualiza tu contraseña y gestiona la seguridad de tu cuenta.</div>
            </a>
        </div>

        <button class="logout-link" id="logout-btn">Cerrar Sesión</button>
    </div>

    <script src="script.js?v=06009"></script>
    <script>
        // Auth check
        const userDataStr = sessionStorage.getItem("strengthos_user");
        if (!userDataStr) {
            window.location.href = "index.html";
        } else {
            const userData = JSON.parse(userDataStr);
            document.getElementById("user-name").innerText = userData.nombre.split(" ")[0];
        }

        document.getElementById("logout-btn").addEventListener("click", () => {
            sessionStorage.removeItem("strengthos_user");
            window.location.href = "index.html";
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW failed:', e));
            });
        }
    </script>
</body>

</html>
