# fly.toml configuration file for StrengthOS

app = "strength-os"
primary_region = "qro" # Puedes cambiar esto a tu región más cercana

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "strengthos_data"
  destination = "/data"

[env]
  DB_PATH = "/data/database.db"
