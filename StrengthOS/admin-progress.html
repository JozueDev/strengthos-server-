<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progreso del Atleta | StrengthOS Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=06009">
    <link rel="icon" type="image/png" href="images/logo.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-100);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        @media (max-width: 540px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body style="padding-top: 90px;">
    <div class="particles-container" id="particles"></div>

    <nav class="navbar scrolled" id="navbar">
        <div class="container nav-content">
            <a href="admin.html" class="logo-container">
                <img src="images/logo.png" alt="StrengthOS Logo" class="logo-img">
                <span class="logo-text">StrengthOS Admin</span>
            </a>
        </div>
    </nav>

    <div class="container section-padding" style="max-width: 860px;">

        <div style="display:flex; align-items:center; gap:16px; margin-bottom:28px; flex-wrap:wrap;">
            <a href="admin.html" class="back-btn">← Clientes</a>
            <h1 id="progress-page-title" style="font-size:1.4rem; color:var(--text-primary);">📈 Progreso del Atleta
            </h1>
        </div>

        <!-- Stats generales -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="admin-prog-weeks">--</div>
                <div class="stat-label">Semanas Activo</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="admin-prog-routines">--</div>
                <div class="stat-label">Rutinas Registradas</div>
            </div>
        </div>

        <!-- Gráficas -->
        <div class="glass-card">
            <h4 style="color:var(--primary-200); margin-bottom:14px;">Evolución por Ejercicio</h4>
            <p style="font-size:0.9rem; color:var(--text-secondary); margin-bottom:16px;">Selecciona el mes a revisar:
            </p>

            <select id="admin-monthly-stats-select"
                style="width:100%;padding:12px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:white;margin-bottom:24px;">
                <option value="">Selecciona un mes...</option>
            </select>

            <div id="admin-progress-stats-container" style="display:flex;flex-direction:column;gap:30px;">
                <p style="color:var(--text-tertiary); text-align:center;">Cargando datos...</p>
            </div>
        </div>

    </div>

    <script src="script.js?v=06009"></script>
    <script src="admin-progress.js?v=06009"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW failed:', e));
            });
        }
    </script>
</body>

</html>
