<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutinas del Atleta | StrengthOS Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=06009">
    <link rel="icon" type="image/png" href="images/logo.png">
    <style>
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
            font-family: inherit;
            white-space: nowrap;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
    </style>
</head>

<body style="padding-top: 90px;">
    <div class="particles-container" id="particles"></div>

    <nav class="navbar scrolled" id="navbar">
        <div class="container nav-content">
            <a href="admin.html" class="logo-container">
                <img src="images/logo.png" alt="StrengthOS Logo" class="logo-img">
                <span class="logo-text">StrengthOS Admin</span>
            </a>
        </div>
    </nav>

    <div class="container section-padding" style="max-width: 860px;">

        <!-- Vista: Calendario -->
        <div id="view-calendar">
            <div style="display:flex; align-items:center; gap:16px; margin-bottom:28px; flex-wrap:wrap;">
                <a href="admin.html" class="back-btn">← Clientes</a>
                <h1 id="routine-page-title" style="font-size:1.4rem; color:var(--text-primary);">📅 Rutinas del Atleta
                </h1>
            </div>

            <p style="color:var(--text-tertiary); font-size:0.9rem; margin-bottom:20px; text-align:center;">
                Haz clic en cualquier día para programar o modificar el entrenamiento.
            </p>

            <div class="glass-card">
                <div class="calendar-wrapper">
                    <div class="calendar-header">
                        <button class="calendar-nav-btn" id="admin-prev-month" type="button">&lt;</button>
                        <h4 id="admin-month-year-display">Calendario</h4>
                        <button class="calendar-nav-btn" id="admin-next-month" type="button">&gt;</button>
                    </div>
                    <div class="calendar-grid" style="margin-bottom:10px;">
                        <div class="calendar-day-name">Dom</div>
                        <div class="calendar-day-name">Lun</div>
                        <div class="calendar-day-name">Mar</div>
                        <div class="calendar-day-name">Mié</div>
                        <div class="calendar-day-name">Jue</div>
                        <div class="calendar-day-name">Vie</div>
                        <div class="calendar-day-name">Sáb</div>
                    </div>
                    <div class="calendar-grid" id="admin-calendar-days"></div>
                </div>
            </div>
        </div>

        <!-- Vista: Editor del Día -->
        <div id="view-editor" style="display:none;">
            <div style="display:flex; align-items:center; gap:16px; margin-bottom:28px; flex-wrap:wrap;">
                <button class="back-btn" id="btn-back-calendar">← Calendario</button>
                <h2 id="editor-date-title" style="font-size:1.2rem; color:var(--primary-100);">Rutina del Día</h2>
            </div>

            <div class="glass-card">
                <form id="routine-editor-form">
                    <input type="hidden" id="routine-date">
                    <div class="input-group">
                        <textarea id="routine-text" rows="12"
                            placeholder="Ej:&#10;Día 1: Empuje&#10;• Press de Banca 4x10&#10;• Elevaciones laterales 3x15..."
                            style="width:100%;padding:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:var(--text-primary);font-family:inherit;font-size:0.95rem;resize:vertical;"></textarea>
                    </div>

                    <!-- Notas del cliente -->
                    <div id="client-notes-container" style="display:none; margin-top:20px;">
                        <label
                            style="color:var(--primary-200); font-size:0.9rem; font-weight:600; display:block; margin-bottom:10px;">
                            📋 Progreso / Notas del Atleta:
                        </label>
                        <div id="admin-client-notes-text"
                            style="width:100%;padding:16px;background:rgba(0,0,0,0.3);border:1px dashed rgba(255,255,255,0.15);border-radius:12px;color:var(--text-secondary);font-family:inherit;font-size:0.9rem;white-space:pre-wrap;line-height:1.6;">
                        </div>
                    </div>

                    <div style="display:flex;gap:12px;margin-top:20px;">
                        <button type="submit" class="btn-primary" style="flex:2;">Guardar Rutina</button>
                        <button type="button" id="btn-delete-routine" class="btn-primary"
                            style="flex:1;background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.4);color:#ef4444;">
                            Limpiar Día
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script src="script.js?v=06009"></script>
    <script src="admin-routines.js?v=06009"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW failed:', e));
            });
        }
    </script>
</body>

</html>
