<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad | StrengthOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=06009">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="/images/logo.png">
    <style>
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
    </style>
</head>

<body style="padding-top: 90px;">
    <div class="particles-container" id="particles"></div>

    <nav class="navbar scrolled" id="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="logo-container">
                <img src="images/logo.png" alt="StrengthOS Logo" class="logo-img">
                <span class="logo-text">StrengthOS</span>
            </a>
        </div>
    </nav>

    <div class="container section-padding" style="max-width: 520px;">
        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 32px;">
            <a href="dashboard.html" class="back-btn">← Menú</a>
            <h1 style="font-size: 1.6rem; color: var(--text-primary);">🔒 Seguridad</h1>
        </div>

        <div class="glass-card">
            <h3 style="margin-bottom: 10px;">Cambiar Contraseña</h3>
            <p style="color: var(--text-tertiary); margin-bottom: 24px; font-size: 0.9rem;">
                Puedes actualizar tu contraseña provisional en cualquier momento.
            </p>

            <form id="change-password-form">
                <div class="input-group">
                    <label>Contraseña Actual</label>
                    <input type="password" id="current_password" placeholder="Tu contraseña actual" required>
                </div>
                <div class="input-group">
                    <label>Nueva Contraseña</label>
                    <input type="password" id="new_password" placeholder="Mínimo 6 caracteres" required>
                </div>
                <div class="input-group">
                    <label>Repetir Nueva Contraseña</label>
                    <input type="password" id="confirm_password" placeholder="Confirma tu nueva contraseña" required>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Actualizar Contraseña</button>
                <div id="password-feedback" style="margin-top: 15px; font-size: 0.85rem; text-align: left;"></div>
            </form>
        </div>
    </div>

    <script src="script.js?v=06009"></script>
    <script>
        // Auth check
        const userDataStr = sessionStorage.getItem("strengthos_user");
        if (!userDataStr) {
            window.location.href = "index.html";
        }
        const userData = JSON.parse(userDataStr || '{}');
        const API_URL = window.location.protocol === 'file:' ? 'http://127.0.0.1:5000/api' : '/api';

        const passwordForm = document.getElementById("change-password-form");
        const feedbackMsg = document.getElementById("password-feedback");

        passwordForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = passwordForm.querySelector("button");
            btn.innerText = "Guardando...";

            const currentPass = document.getElementById("current_password").value;
            const newPass = document.getElementById("new_password").value;
            const confirmPass = document.getElementById("confirm_password").value;

            if (newPass !== confirmPass) {
                feedbackMsg.style.color = "var(--warning)";
                feedbackMsg.innerText = "Las nuevas contraseñas no coinciden.";
                btn.innerText = "Actualizar Contraseña";
                return;
            }
            if (newPass.length < 6) {
                feedbackMsg.style.color = "var(--warning)";
                feedbackMsg.innerText = "La contraseña debe tener al menos 6 caracteres.";
                btn.innerText = "Actualizar Contraseña";
                return;
            }

            feedbackMsg.innerText = "";
            try {
                const res = await fetch(`${API_URL}/cliente/cambiar-password`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        user_id: userData.user_id,
                        contrasena_actual: currentPass,
                        nueva_contrasena: newPass
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    feedbackMsg.style.color = "var(--success)";
                    feedbackMsg.innerText = "¡Contraseña actualizada correctamente!";
                    passwordForm.reset();
                } else {
                    feedbackMsg.style.color = "var(--warning)";
                    feedbackMsg.innerText = data.error || "Ocurrió un error al actualizar.";
                }
            } catch (error) {
                feedbackMsg.style.color = "var(--warning)";
                feedbackMsg.innerText = "Error de conexión. Intenta más tarde.";
            } finally {
                btn.innerText = "Actualizar Contraseña";
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW failed:', e));
            });
        }
    </script>
</body>

</html>
